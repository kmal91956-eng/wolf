<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOLF</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #f5b400;
}

.logo{
font-size:32px;
font-weight:bold;
color:#f5b400;
}

.menu{
font-size:30px;
cursor:pointer;
}

.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:45px;
color:#f5b400;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#ccc;
margin-bottom:30px;
}

.btn{
background:#f5b400;
color:black;
padding:15px 35px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}

.levels{
display:flex;
overflow:auto;
gap:10px;
padding:20px;
}

.levels button{
background:#1d1d1d;
color:white;
border:1px solid #f5b400;
padding:12px 20px;
border-radius:10px;
min-width:70px;
}

.levels button:hover{
background:#f5b400;
color:black;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#181818;
border-radius:15px;
overflow:hidden;
border:1px solid #333;
}

.card img{
width:100%;
display:block;
}

.card h3{
padding:10px;
color:#f5b400;
}

.card p{
padding:0 10px 15px;
color:#aaa;
}
</style>

</head>

<body>

<header>
<div class="logo">WOLF</div>
<div class="menu">☰</div>
</header>

<section class="hero">
<h1>أفضل تصاميم Clash of Clans</h1>
<p>اختر مستوى التاون هول وشاهد أفضل التصاميم.</p>

<a class="btn" href="#">ابدأ الآن</a>
</section>

<div class="levels">
<button>TH5</button>
<button>TH6</button>
<button>TH7</button>
<button>TH8</button>
<button>TH9</button>
<button>TH10</button>
<button>TH11</button>
<button>TH12</button>
<button>TH13</button>
<button>TH14</button>
<button>TH15</button>
<button>TH16</button>
<button>TH17</button>
</div>

<div class="cards">

<div class="card">
<img src="https://placehold.co/400x400?text=TH5">
<h3>TH5</h3>
<p>سيتم إضافة التصاميم قريبًا.</p>
</div>

<div class="card">
<img src="https://placehold.co/400x400?text=TH6">
<h3>TH6</h3>
<p>سيتم إضافة التصاميم قريبًا.</p>
</div>

</div>

</body>
</html>
