<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOLF</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
background:#171717;
border-bottom:2px solid #d4af37;
position:sticky;
top:0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:30px;
font-weight:bold;
color:#d4af37;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
background:#222;
color:white;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
color:#d4af37;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:16px;
overflow:hidden;
border:1px solid #2f2f2f;
}

.card img{
width:100%;
display:block;
}

.card h3{
padding:12px;
text-align:center;
}
</style>

</head>

<body>

<header>
<div class="logo">
WOLF
</div>
</header>

<div class="search">
<input placeholder="Search Town Hall...">
</div>

<div class="section">
<h2>Town Hall</h2>

<div class="grid">

<div class="card">
<img src="https://placehold.co/600x600/222222/d4af37?text=TH6">
<h3>TH6</h3>
</div>

<div class="card">
<img src="https://placehold.co/600x600/222222/d4af37?text=TH7">
<h3>TH7</h3>
</div>

<div class="card">
<img src="https://placehold.co/600x600/222222/d4af37?text=TH8">
<h3>TH8</h3>
</div>

<div class="card">
<img src="https://placehold.co/600x600/222222/d4af37?text=TH9">
<h3>TH9</h3>
</div>

</div>

</div>

</body>
</html>
